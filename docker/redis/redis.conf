# Redis 配置文件

# 绑定地址
bind 0.0.0.0

# 端口
port 6379

# 持久化配置
appendonly yes
appendfsync everysec
appendfilename appendonly.aof

# 内存配置
maxmemory 512mb
maxmemory-policy allkeys-lru

# 日志配置
loglevel notice
logfile ""

# 数据库数量
databases 16

# 超时配置
timeout 0
tcp-keepalive 300

# 连接配置
maxclients 10000

# 慢查询配置
slowlog-log-slower-than 10000
slowlog-max-len 128
