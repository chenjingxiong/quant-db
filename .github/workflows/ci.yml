# -*- coding: utf-8 -*-
# Quant DB CI/CD Pipeline
# 持续集成和持续部署工作流

name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - 'tests/**'
      - 'requirements.txt'
      - '.github/workflows/*.yml'
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.10'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ===========================
  # 代码质量检查
  # ===========================
  lint:
    name: 代码质量检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt
          pip install black flake8 mypy pylint isort

      - name: Black格式检查
        run: black --check backend/

      - name: isort导入排序检查
        run: isort --check-only backend/

      - name: Flake8代码检查
        run: flake8 backend/ --max-line-length=100 --extend-ignore=E203,W503

      - name: MyPy类型检查
        run: mypy backend/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true

      - name: Pylint代码评分
        run: pylint backend/ --fail-under=8.0
        continue-on-error: true

  # ===========================
  # 安全扫描
  # ===========================
  security:
    name: 安全扫描
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 安装依赖
        run: pip install bandit safety

      - name: Bandit安全检查
        run: bandit -r backend/ -f json -o bandit-report.json
        continue-on-error: true

      - name: Safety依赖检查
        run: safety check --json
        continue-on-error: true

      - name: 上传安全报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: bandit-report.json

  # ===========================
  # 单元测试
  # ===========================
  test:
    name: 单元测试
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: 运行测试
        run: |
          pytest tests/ \
            --cov=backend \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing \
            -v \
            --tb=short

      - name: 上传覆盖率到Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-${{ matrix.python-version }}

      - name: 上传覆盖率报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: htmlcov/

  # ===========================
  # 集成测试
  # ===========================
  integration-test:
    name: 集成测试
    runs-on: ubuntu-latest
    needs: [test]

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: quant_user
          POSTGRES_PASSWORD: quant_pass
          POSTGRES_DB: quant_db_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      rabbitmq:
        image: rabbitmq:3-management-alpine
        env:
          RABBITMQ_DEFAULT_USER: quant_user
          RABBITMQ_DEFAULT_PASS: quant_pass
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 30s
          --health-timeout 10s
          --health-retries 3
        ports:
          - 5672:5672

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 安装依赖
        run: pip install -r requirements.txt pytest pytest-asyncio

      - name: 运行集成测试
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: quant_user
          POSTGRES_PASSWORD: quant_pass
          POSTGRES_DB: quant_db_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          RABBITMQ_HOST: localhost
          RABBITMQ_PORT: 5672
          RABBITMQ_USER: quant_user
          RABBITMQ_PASS: quant_pass
          TDENGINE_AVAILABLE: false
        run: |
          pytest tests/test_integration.py -v -x

  # ===========================
  # 构建Docker镜像
  # ===========================
  build:
    name: 构建Docker镜像
    runs-on: ubuntu-latest
    needs: [integration-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录到Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 提取镜像元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 构建并推送镜像
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================
  # 部署到测试环境
  # ===========================
  deploy-staging:
    name: 部署到测试环境
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://staging.quant-db.local

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置kubectl
        uses: azure/setup-kubectl@v4

      - name: 部署到Kubernetes
        run: |
          echo "部署到测试环境..."
          # 这里添加实际的kubectl命令
          # kubectl set image deployment/backend backend=${{ needs.build.outputs.image-tag }}

      - name: 健康检查
        run: |
          echo "等待服务就绪..."
          sleep 30
          # kubectl wait --for=condition=available --timeout=300s deployment/backend

  # ===========================
  # 通知
  # ===========================
  notify:
    name: 发送通知
    runs-on: ubuntu-latest
    needs: [lint, security, test, integration-test, build, deploy-staging]
    if: always()

    steps:
      - name: 发送GitHub通知
        run: |
          if [ "${{ needs.test.result }}" == "failure" ]; then
            echo "❌ 测试失败"
          elif [ "${{ needs.build.result }}" == "failure" ]; then
            echo "❌ 构建失败"
          else
            echo "✅ CI/CD成功完成"
          fi

      - name: 创建部署摘要
        if: always()
        run: |
          echo "## CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Lint: ${{ needs.lint.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security: ${{ needs.security.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Test: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Integration: ${{ needs.integration-test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Deploy: ${{ needs.deploy-staging.result }}" >> $GITHUB_STEP_SUMMARY
